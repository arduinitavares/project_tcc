<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#0d74f2',
                        'background-light': '#f5f7f8',
                        'background-dark': '#101822',
                    },
                    fontFamily: {
                        display: ['Inter', 'sans-serif'],
                    },
                },
            },
        };
    </script>
    <title>AgenticFlow Dashboard</title>
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
    <header
        class="border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-background-dark/70 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-primary p-1.5 rounded-lg">
                    <span class="material-symbols-outlined text-white text-2xl">account_tree</span>
                </div>
                <h1 class="text-xl font-bold tracking-tight">AgenticFlow</h1>
            </div>
            <span class="text-sm text-slate-500">Deterministic Workflow Dashboard</span>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8">
            <div>
                <h2 class="text-3xl font-extrabold tracking-tight">Projects</h2>
                <p class="text-slate-500 dark:text-slate-400 mt-1">Select a project to enter its workflow pipeline or
                    create a new one.</p>
            </div>
            <button onclick="openCreateProjectModal()"
                class="inline-flex items-center gap-2 bg-primary hover:bg-primary/90 text-white font-bold py-2.5 px-5 rounded-lg transition-all shadow-lg shadow-primary/25">
                <span class="material-symbols-outlined text-xl">add</span>
                Create New Project
            </button>
        </div>

        <div id="projects-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </main>

    <!-- Create Project Modal -->
    <div id="create-project-modal" class="fixed inset-0 z-[100] flex items-center justify-center p-4 sm:p-6 hidden">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm transition-opacity"
            onclick="closeCreateProjectModal()"></div>
        <div
            class="bg-white dark:bg-slate-800 rounded-xl shadow-xl w-full max-w-lg relative z-10 flex flex-col border border-slate-200 dark:border-slate-700">
            <div class="flex items-center justify-between px-6 py-4 border-b border-slate-200 dark:border-slate-700">
                <h3 class="text-lg font-bold">Create New Project</h3>
                <button onclick="closeCreateProjectModal()"
                    aria-label="Close modal"
                    class="text-slate-400 hover:text-slate-500 dark:hover:text-slate-300 transition-colors">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <div class="p-6 space-y-4">
                <div class="space-y-2">
                    <label for="modal-project-name" class="text-sm font-semibold text-slate-700 dark:text-slate-300">Project Name <span class="text-red-500">*</span></label>
                    <input id="modal-project-name" type="text" placeholder="e.g. Project Phoenix"
                        class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-primary" required />
                </div>
                <div class="space-y-2">
                    <label for="modal-spec-path" class="text-sm font-semibold text-slate-700 dark:text-slate-300">Specification File
                        Path <span class="text-red-500">*</span></label>
                    <input id="modal-spec-path" type="text" placeholder="C:\\path\\to\\spec.md"
                        class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-primary" required />
                    <p class="text-xs text-slate-500 mt-1">Provide the absolute path to your markdown specification.</p>
                </div>
            </div>
            <div
                class="flex items-center justify-end gap-3 px-6 py-4 border-t border-slate-200 dark:border-slate-700 bg-slate-50/50 dark:bg-slate-800/50 rounded-b-xl">
                <button onclick="closeCreateProjectModal()"
                    class="px-5 py-2.5 rounded-lg border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 font-semibold hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors">Cancel</button>
                <button id="btn-submit-project" onclick="submitNewProject()"
                    class="px-6 py-2.5 rounded-lg bg-primary hover:bg-primary/90 text-white font-bold transition-all shadow-sm">
                    Create Project
                </button>
            </div>
        </div>
    </div>

    <script src="/dashboard/app.js"></script>
</body>

</html>
